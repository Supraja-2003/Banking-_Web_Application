<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(to right, #d1f2eb, #ffffff);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      width: 400px;
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    input[type="submit"] {
      width: 100%;
      background-color: #2c3e50;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 15px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #34495e;
    }

    .login-link {
      margin-top: 15px;
      display: block;
      font-size: 14px;
    }

    .login-link a {
      color: #2980b9;
      text-decoration: none;
      font-weight: bold;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<form action="regg" method="post">
<h1>Register</h1>
Full Name<br><input type="text" name="fname"><br>
Email<br><input type="text" name="mail"><br>
UserName<br><input type="text" name="uname"><br>
Password<br><input type="password" name="pwd"><br>
Confirm Password<br><input type="password" name="cpwd"><br>
<input type="submit" value="Register"><br>
Already have an account?<a href="Login.html">Login Here</a> 
</form>
</body>
</html>
